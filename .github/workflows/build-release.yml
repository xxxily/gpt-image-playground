name: Build & Publish Release

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            tag:
                description: 'Release tag to rebuild, for example v2.0.0'
                required: true
                type: string
            android_only:
                description: 'Only build and upload the Android APK for this tag'
                required: false
                default: false
                type: boolean

concurrency:
    group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    cancel-in-progress: false

permissions:
    contents: read

env:
    NODE_VERSION: '20'
    ANDROID_API_LEVEL: '35'
    ANDROID_BUILD_TOOLS_VERSION: '35.0.0'
    ANDROID_NDK_VERSION: '27.2.12479018'

jobs:
    validate:
        name: Validate release metadata and web build
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            tag_name: ${{ steps.release.outputs.tag_name }}
            version: ${{ steps.release.outputs.version }}
            release_title: ${{ steps.release.outputs.release_title }}

        steps:
            - name: Resolve release tag and version
              id: release
              shell: bash
              run: |
                  set -euo pipefail

                  if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
                    TAG_NAME="${{ inputs.tag }}"
                  else
                    TAG_NAME="${GITHUB_REF_NAME}"
                  fi

                  if [[ ! "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
                    echo "Release tag must look like v2.0.0 or v2.0.0-beta.1, got: ${TAG_NAME}" >&2
                    exit 1
                  fi

                  VERSION="${TAG_NAME#v}"
                  {
                    echo "tag_name=${TAG_NAME}"
                    echo "version=${VERSION}"
                    echo "release_title=GPT Image Playground ${TAG_NAME}"
                  } >> "${GITHUB_OUTPUT}"

            - name: Check out release source
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ steps.release.outputs.tag_name }}

            - name: Set up Node.js with npm cache
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install frontend dependencies
              run: npm ci --prefer-offline

            - name: Verify tag, changelog, and app versions match
              shell: bash
              run: |
                  set -euo pipefail
                  VERSION="${{ steps.release.outputs.version }}"

                  node --input-type=commonjs <<'NODE'
                  const fs = require('fs');

                  const version = process.env.VERSION;
                  const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
                  const packageLock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
                  const tauriConfig = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
                  const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
                  const cargoVersion = cargoToml.match(/^version\s*=\s*"([^"]+)"/m)?.[1];
                  const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');

                  const versions = {
                    'package.json': packageJson.version,
                    'package-lock.json': packageLock.version,
                    'package-lock root package': packageLock.packages?.['']?.version,
                    'src-tauri/tauri.conf.json': tauriConfig.version,
                    'src-tauri/Cargo.toml': cargoVersion,
                  };

                  for (const [file, fileVersion] of Object.entries(versions)) {
                    if (fileVersion !== version) {
                      throw new Error(`${file} version ${fileVersion ?? '<missing>'} does not match release tag ${version}`);
                    }
                  }

                  const escapedVersion = version.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                  const changelogHeader = new RegExp(`^## v${escapedVersion}(\\s|$)`, 'm');
                  if (!changelogHeader.test(changelog)) {
                    throw new Error(`CHANGELOG.md is missing a ## v${version} section`);
                  }
                  NODE
              env:
                  VERSION: ${{ steps.release.outputs.version }}

            - name: Lint source files
              run: npm run lint

            - name: Type-check TypeScript
              run: npx tsc --noEmit

            - name: Build web application
              run: npm run build

    prepare-release:
        name: Prepare GitHub Release with Chinese notes
        needs: validate
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            release_id: ${{ steps.release.outputs.release_id }}

        steps:
            - name: Check out release source
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ needs.validate.outputs.tag_name }}

            - name: Extract v${{ needs.validate.outputs.version }} Chinese release notes
              shell: bash
              run: |
                  set -euo pipefail
                  VERSION="${{ needs.validate.outputs.version }}"

                  awk -v header="## v${VERSION}" '
                    index($0, header) == 1 && (length($0) == length(header) || substr($0, length(header) + 1, 1) ~ /[[:space:]]/) { capture = 1; print; next }
                    capture && /^## / { exit }
                    capture { print }
                  ' CHANGELOG.md > release-notes.md

                  if [[ ! -s release-notes.md ]]; then
                    echo "No release notes found for v${VERSION} in CHANGELOG.md" >&2
                    exit 1
                  fi

                  cat >> release-notes.md <<'MARKDOWN'

                  ## macOS 用户打开提示

                  本项目免费开源，macOS DMG 默认不使用付费 Apple Developer ID 签名和 Apple notarization。通过浏览器或 GitHub Release 下载后，如果系统提示应用“已损坏”或无法打开，请按下面步骤处理：

                  1. 双击 DMG，把 `GPT Image Playground.app` 拖到“应用程序”目录。
                  2. 打开“终端”，执行：

                  ```bash
                  xattr -dr com.apple.quarantine "/Applications/GPT Image Playground.app"
                  ```

                  3. 再到“应用程序”目录中右键点击 `GPT Image Playground.app`，选择“打开”。

                  这个提示不代表文件真的损坏，而是 macOS Gatekeeper 对未公证下载应用的拦截。
                  MARKDOWN

                  {
                    echo "## Release notes preview"
                    cat release-notes.md
                  } >> "${GITHUB_STEP_SUMMARY}"

            - name: Create or update GitHub Release
              id: release
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG_NAME: ${{ needs.validate.outputs.tag_name }}
                  RELEASE_TITLE: ${{ needs.validate.outputs.release_title }}
              run: |
                  set -euo pipefail

                  if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
                    gh release edit "${TAG_NAME}" \
                      --title "${RELEASE_TITLE}" \
                      --notes-file release-notes.md
                  else
                    gh release create "${TAG_NAME}" \
                      --title "${RELEASE_TITLE}" \
                      --notes-file release-notes.md \
                      --verify-tag
                  fi

                  RELEASE_ID="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" --jq '.id')"
                  echo "release_id=${RELEASE_ID}" >> "${GITHUB_OUTPUT}"

    build:
        name: Build and upload ${{ matrix.name }} desktop app
        needs:
            - validate
            - prepare-release
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.android_only }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-latest
                      name: macOS
                    - os: windows-latest
                      name: Windows
                    - os: ubuntu-22.04
                      name: Linux

        runs-on: ${{ matrix.os }}
        permissions:
            contents: write

        steps:
            - name: Check out release source
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ needs.validate.outputs.tag_name }}

            - name: Set up Node.js with npm cache
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Rust dependencies
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: './src-tauri'

            - name: Install Linux system dependencies
              if: matrix.os == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libappindicator3-dev \
                    librsvg2-dev \
                    patchelf

            - name: Install frontend dependencies
              run: npm ci --prefer-offline

            - name: Verify updater signing key
              shell: bash
              env:
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
              run: |
                  set -euo pipefail

                  if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
                    echo "::error::TAURI_SIGNING_PRIVATE_KEY is required because desktop builds generate signed updater artifacts."
                    exit 1
                  fi

            - name: Prepare macOS signing material
              if: matrix.os == 'macos-latest'
              id: macos-signing
              shell: bash
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
                  APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
                  APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
              run: |
                  set -euo pipefail

                  missing=()
                  present=()
                  for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_P8; do
                    if [[ -z "${!name:-}" ]]; then
                      missing+=("${name}")
                    else
                      present+=("${name}")
                    fi
                  done

                  if (( ${#present[@]} == 0 )); then
                    echo "::warning::macOS signing secrets are not configured; uploading an unsigned and unnotarized DMG. Release notes include user-side Gatekeeper instructions."
                    echo "enabled=false" >> "${GITHUB_OUTPUT}"
                    exit 0
                  fi

                  if (( ${#missing[@]} > 0 )); then
                    echo "::error::Incomplete macOS signing secrets: missing ${missing[*]}. Configure all Apple secrets or remove the partial configuration."
                    exit 1
                  fi

                  apple_api_key_path="${RUNNER_TEMP}/AppStoreConnectAuthKey_${GITHUB_RUN_ID}.p8"
                  printf '%s' "${APPLE_API_KEY_P8}" > "${apple_api_key_path}"
                  chmod 600 "${apple_api_key_path}"
                  echo "enabled=true" >> "${GITHUB_OUTPUT}"
                  echo "apple_api_key_path=${apple_api_key_path}" >> "${GITHUB_OUTPUT}"

            - name: Build and upload ${{ matrix.name }} Tauri bundles
              if: matrix.os != 'macos-latest'
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  releaseId: ${{ needs.prepare-release.outputs.release_id }}
                  tagName: ${{ needs.validate.outputs.tag_name }}
                  projectPath: './src-tauri'
                  includeUpdaterJson: true
                  updaterJsonPreferNsis: true
                  args: '--verbose --config tauri.updater.conf.json'

            - name: Build and upload unsigned macOS Tauri bundles
              if: matrix.os == 'macos-latest' && steps.macos-signing.outputs.enabled != 'true'
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  releaseId: ${{ needs.prepare-release.outputs.release_id }}
                  tagName: ${{ needs.validate.outputs.tag_name }}
                  projectPath: './src-tauri'
                  includeUpdaterJson: true
                  updaterJsonPreferNsis: true
                  args: '--verbose --config tauri.updater.conf.json'

            - name: Build and upload signed macOS Tauri bundles
              if: matrix.os == 'macos-latest' && steps.macos-signing.outputs.enabled == 'true'
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
                  APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
                  APPLE_API_KEY_PATH: ${{ steps.macos-signing.outputs.apple_api_key_path }}
              with:
                  releaseId: ${{ needs.prepare-release.outputs.release_id }}
                  tagName: ${{ needs.validate.outputs.tag_name }}
                  projectPath: './src-tauri'
                  includeUpdaterJson: true
                  updaterJsonPreferNsis: true
                  args: '--verbose --config tauri.updater.conf.json'

    build-android:
        name: Build and upload Android APK
        needs:
            - validate
            - prepare-release
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Check out release source
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ needs.validate.outputs.tag_name }}

            - name: Set up Node.js with npm cache
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '17'

            - name: Set up Android SDK
              uses: android-actions/setup-android@v3
              with:
                  packages: >-
                      platform-tools
                      platforms;android-${{ env.ANDROID_API_LEVEL }}
                      build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}
                      ndk;${{ env.ANDROID_NDK_VERSION }}

            - name: Export Android SDK paths
              shell: bash
              run: |
                  set -euo pipefail

                  SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
                  if [[ -z "${SDK_ROOT}" ]]; then
                    echo "Android SDK root was not set by the setup-android action" >&2
                    exit 1
                  fi

                  {
                    echo "ANDROID_HOME=${SDK_ROOT}"
                    echo "ANDROID_SDK_ROOT=${SDK_ROOT}"
                    echo "NDK_HOME=${SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"
                    echo "ANDROID_NDK_HOME=${SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"
                  } >> "${GITHUB_ENV}"

            - name: Cache Rust dependencies
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: './src-tauri'

            - name: Install frontend dependencies
              run: npm ci --prefer-offline

            - name: Initialize Android project
              run: npm run android:init -- --ci

            - name: Sync Android launcher icons
              run: npm run sync:android-icons

            - name: Detect Android signing secrets
              id: android-signing
              shell: bash
              env:
                  ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
                  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
                  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
              run: |
                  set -euo pipefail

                  if [[ -n "${ANDROID_KEY_BASE64}" && -n "${ANDROID_KEY_ALIAS}" && -n "${ANDROID_KEY_PASSWORD}" ]]; then
                    echo "enabled=true" >> "${GITHUB_OUTPUT}"
                  else
                    echo "enabled=false" >> "${GITHUB_OUTPUT}"
                  fi

            - name: Configure Android release signing
              if: ${{ steps.android-signing.outputs.enabled == 'true' }}
              env:
                  ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
                  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
                  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
              run: |
                  node --input-type=commonjs <<'NODE'
                  const { mkdirSync, readFileSync, writeFileSync } = require('node:fs');
                  const path = require('node:path');

                  const projectRoot = process.cwd();
                  const androidRoot = path.join(projectRoot, 'src-tauri', 'gen', 'android');
                  const gradleFile = path.join(androidRoot, 'app', 'build.gradle.kts');
                  const keystoreFile = path.join(process.env.RUNNER_TEMP ?? androidRoot, 'android-release.jks');
                  const keystorePropertiesFile = path.join(androidRoot, 'keystore.properties');

                  const requiredEnv = ['ANDROID_KEY_BASE64', 'ANDROID_KEY_ALIAS', 'ANDROID_KEY_PASSWORD'];
                  for (const name of requiredEnv) {
                    if (!process.env[name]) {
                      throw new Error(`${name} is required to configure Android release signing`);
                    }
                  }

                  mkdirSync(path.dirname(keystoreFile), { recursive: true });
                  writeFileSync(keystoreFile, Buffer.from(process.env.ANDROID_KEY_BASE64, 'base64'));
                  writeFileSync(
                    keystorePropertiesFile,
                    [
                      `keyAlias=${process.env.ANDROID_KEY_ALIAS}`,
                      `password=${process.env.ANDROID_KEY_PASSWORD}`,
                      `storeFile=${keystoreFile}`,
                      '',
                    ].join('\n'),
                    { mode: 0o600 },
                  );

                  let gradle = readFileSync(gradleFile, 'utf8');

                  const imports = [];
                  if (!gradle.includes('import java.io.FileInputStream')) {
                    imports.push('import java.io.FileInputStream');
                  }
                  if (!gradle.includes('import java.util.Properties')) {
                    imports.push('import java.util.Properties');
                  }
                  if (imports.length > 0) {
                    gradle = `${imports.join('\n')}\n\n${gradle}`;
                  }

                  const signingConfig = `    signingConfigs {
                      create("release") {
                          val keystorePropertiesFile = rootProject.file("keystore.properties")
                          val keystoreProperties = Properties()

                          if (keystorePropertiesFile.exists()) {
                              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
                          }

                          keyAlias = keystoreProperties["keyAlias"] as String
                          keyPassword = keystoreProperties["password"] as String
                          storeFile = file(keystoreProperties["storeFile"] as String)
                          storePassword = keystoreProperties["password"] as String
                      }
                  }

                  `;

                  if (!gradle.includes('create("release")')) {
                    if (gradle.includes('    buildTypes {')) {
                      gradle = gradle.replace('    buildTypes {', `${signingConfig}    buildTypes {`);
                    } else {
                      gradle = gradle.replace(/android\s*\{\n/, (match) => `${match}${signingConfig}`);
                    }
                  }

                  if (!gradle.includes('signingConfig = signingConfigs.getByName("release")')) {
                    if (gradle.includes('getByName("release") {')) {
                      gradle = gradle.replace(
                        /getByName\("release"\)\s*\{\n/,
                        (match) => `${match}            signingConfig = signingConfigs.getByName("release")\n`,
                      );
                    } else if (gradle.includes('    buildTypes {')) {
                      gradle = gradle.replace(
                        '    buildTypes {',
                        '    buildTypes {\n        getByName("release") {\n            signingConfig = signingConfigs.getByName("release")\n        }\n',
                      );
                    } else {
                      const block = `    buildTypes {
                      getByName("release") {
                          signingConfig = signingConfigs.getByName("release")
                      }
                  }
                  `;
                      gradle = gradle.replace(/android\s*\{\n/, (match) => `${match}${block}`);
                    }
                  }

                  writeFileSync(gradleFile, gradle);
                  NODE

            - name: Build release-signed Android APK
              if: ${{ steps.android-signing.outputs.enabled == 'true' }}
              run: npm run build:android -- --ci --target aarch64 --verbose

            - name: Build debug-signed Android APK
              if: ${{ steps.android-signing.outputs.enabled != 'true' }}
              run: |
                  echo "::warning::Android signing secrets are not configured; uploading a debug-signed APK."
                  npm run build:android -- --ci --debug --target aarch64 --verbose

            - name: Upload Android APK assets
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG_NAME: ${{ needs.validate.outputs.tag_name }}
                  VERSION: ${{ needs.validate.outputs.version }}
              run: |
                  set -euo pipefail
                  shopt -s globstar nullglob

                  apk_files=(src-tauri/gen/android/app/build/outputs/apk/**/*.apk)
                  if (( ${#apk_files[@]} == 0 )); then
                    echo "No APK files were generated under src-tauri/gen/android/app/build/outputs/apk" >&2
                    exit 1
                  fi

                  for apk_file in "${apk_files[@]}"; do
                    apk_name="$(basename "${apk_file}")"
                    asset_name="GPT.Image.Playground_${VERSION}_android_${apk_name}"
                    cp "${apk_file}" "${asset_name}"
                    gh release upload "${TAG_NAME}" "${asset_name}" --clobber
                    echo "- ${asset_name}" >> "${GITHUB_STEP_SUMMARY}"
                  done
